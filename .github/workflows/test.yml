name: GreenPulse OS Full Test Suite CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-pytest:
    name: FastAPI Backend Pytest
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'
          cache-dependency-path: 'backend/fastapi/requirements-dev.txt'

      - name: Install Dependencies
        run: |
          cd backend/fastapi
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Pytest Backend Test Suite & Coverage
        env:
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          SECRET_KEY: "testsecret"
          DEBUG: "True"
          ENVIRONMENT: "testing"
          REDIS_URL: "redis://localhost:6379/0"
          MQTT_BROKER_HOST: "localhost"
          PYTHONPATH: "."
        run: |
          cd backend/fastapi
          pytest --cov=app --cov-report=term-missing --cov-report=xml

  frontend-vitest:
    name: React Vite Frontend Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Vitest Frontend Test Suite & Coverage
        run: |
          cd frontend
          npm run test:coverage
