name: GreenPulse OS Full Test Suite CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-django:
    name: Django Backend Tests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/django/requirements.txt'

      - name: Install Dependencies
        run: |
          cd backend/django
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django Backend Test Suite
        env:
          SECRET_KEY: "testsecret"
          DEBUG: "True"
          REDIS_URL: "redis://localhost:6379/0"
        run: |
          cd backend/django
          python manage.py test

  frontend-vitest:
    name: React Vite Frontend Vitest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Vitest Frontend Test Suite & Coverage
        run: |
          cd frontend
          npm run test:coverage
